name: EduBot Publish Due Posts

on:
  schedule:
    - cron: "0 * * * *"   # every hour (best-effort — GitHub may delay)
  workflow_dispatch:        # manual trigger from GitHub UI or dashboard

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install packages
        run: uv sync

      - name: Publish due posts
        run: uv run python scripts/publish_due.py
        env:
          DISCORD_WEBHOOK_EDUCATIONAL: ${{ secrets.DISCORD_WEBHOOK_EDUCATIONAL }}
          DISCORD_WEBHOOK_CREATIVE:    ${{ secrets.DISCORD_WEBHOOK_CREATIVE }}
          REDDIT_CLIENT_ID:            ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:        ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:             ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:             ${{ secrets.REDDIT_PASSWORD }}
          REDDIT_USER_AGENT:           "EduBot/1.0"
          SUPABASE_URL:                ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:           ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOG_LEVEL:                   INFO
          DRY_RUN:                     "false"
